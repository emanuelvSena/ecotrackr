<!DOCTYPE html>
<html>
<head>
<title>EcoCalc + API</title>

<style>
body{font-family:Arial;max-width:600px;margin:50px auto;padding:20px}

input,button{padding:10px;margin:5px;width:100%;box-sizing:border-box}

button{background:#3498db;color:white;border:none;border-radius:5px;cursor:pointer}

.resultado{background:#ecf0f1;padding:20px;margin-top:20px;border-radius:5px}

.json{background:#2c3e50;color:#ecf0f1;padding:15px;border-radius:5px;font-family:monospace;white-space:pre-wrap}

.estado{font-size:14px;margin-bottom:10px}

.iot{background:#e8f8f5;padding:15px;margin-top:20px;border-radius:5px}

</style>
</head>

<body>

<h1>🌐 EcoCalc con API</h1>
<div class="estado" id="estadoAPI">🟡 Verificando conexión...</div>

<input type="number" id="num1" placeholder="Número 1" value="10">
<input type="number" id="num2" placeholder="Número 2" value="5">

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">

<button onclick="consumir('sumar')">➕ Sumar</button>
<button onclick="consumir('restar')">➖ Restar</button>
<button onclick="consumir('multiplicar')">✖️ Multiplicar</button>
<button onclick="consumir('dividir')">➗ Dividir</button>
<button onclick="consumirPorcentaje()">💯 Porcentaje</button>
<button onclick="consumirSaludo()">👋 Saludar</button>
<button onclick="hablar(resultadoNumero.textContent)">🗣️ Hablar resultado</button>

</div>

<div class="resultado">
<h3>Resultado</h3>
<div id="resultadoNumero" style="font-size:32px;font-weight:bold;text-align:center;">0</div>
</div>

<div class="json">
<strong>Respuesta JSON:</strong>
<pre id="jsonRespuesta">{}</pre>
</div>

<!-- Sección IoT -->
<div class="iot">
<h3>🌲 Sensores Ambientales</h3>

<p>🌡 Temp: <span id="temp">--</span> °C</p>
<p>💧 Humedad: <span id="hum">--</span> %</p>
<p>🌫 AQI: <span id="aqi">--</span></p>

<h4 id="ecoTip">Esperando lectura...</h4>

<button onclick="leerSensores()">Nueva lectura</button>
</div>

<script>

const API_URL='http://localhost:3000/api';
const estado=document.getElementById('estadoAPI');
const resultadoNumero=document.getElementById('resultadoNumero');
const jsonRespuesta=document.getElementById('jsonRespuesta');


// Estado de API
fetch('http://localhost:3000')
.then(res=>{
if(res.ok){
estado.innerHTML='🟢 API conectada';
estado.style.color='green';
}})
.catch(()=>{
estado.innerHTML='🔴 API no disponible';
estado.style.color='red';
});


// resultado hablado

/**
* Lee un texto usando síntesis de voz
* @param {string} texto Texto a pronunciar
*/

function hablar(texto){

if(!window.speechSynthesis){
alert("Tu navegador no soporta síntesis de voz.");
return;
}

const mensaje=new SpeechSynthesisUtterance(texto);
mensaje.lang='es-ES';

mensaje.onend=()=>console.log("Voz finalizada");

speechSynthesis.speak(mensaje);
}


// operaciones

function consumir(operacion){

const a=document.getElementById('num1').value;
const b=document.getElementById('num2').value;

fetch(`${API_URL}/${operacion}?a=${a}&b=${b}`)
.then(res=>res.json())
.then(data=>{
resultadoNumero.textContent=data.resultado;
jsonRespuesta.textContent=JSON.stringify(data,null,2);
hablar(data.resultado);
})
.catch(err=>{
resultadoNumero.textContent='❌ Error';
jsonRespuesta.textContent=JSON.stringify({error:err.message},null,2);
});
}


// porcentaje
function consumirPorcentaje(){

const total=document.getElementById('num1').value;
const porcentaje=document.getElementById('num2').value;

fetch(`${API_URL}/porcentaje?total=${total}&porcentaje=${porcentaje}`)
.then(res=>res.json())
.then(data=>{
resultadoNumero.textContent=data.resultado;
jsonRespuesta.textContent=JSON.stringify(data,null,2);
hablar(data.resultado);
});
}


function consumirSaludo(){

const nombre= 'Visitante';

fetch(`${API_URL}/saludar?nombre=${nombre}`)
.then(res=>res.json())
.then(data=>{
resultadoNumero.textContent=data.resultado;
jsonRespuesta.textContent=JSON.stringify(data,null,2);
hablar(data.resultado);
});
}



// IoT usando random para generar el rango


function random(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generarTip(t,h,a){
if(t>28)return "Alta temperatura, ahorra energía";
if(h>70)return "Alta humedad, recolecta agua de lluvia";
if(a<50)return "Calidad excelente, recicla al aire libre";
return "Condiciones normales";
}

function leerSensores(){

const t=random(18,33);
const h=random(40,80);
const a=random(20,120);

document.getElementById("temp").textContent=t;
document.getElementById("hum").textContent=h;
document.getElementById("aqi").textContent=a;

const tip=generarTip(t,h,a);
document.getElementById("ecoTip").textContent=tip;

hablar(tip);
}

// función para cambiar el rango de los sensores cada 10 seg
setInterval(leerSensores,10000);

</script>
</body>
</html>
